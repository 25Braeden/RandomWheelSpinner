<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Clean and fair online random wheel spinner.">
    <title>Wheel Spinner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎡 Wheel Spinner</h1>
            <p class="subtitle">Make fair random decisions</p>
        </header>
        
        <canvas id="wheel" width="520" height="520"></canvas>
        
        <div class="controls">
            <button onclick="spin()" class="spin-btn">SPIN THE WHEEL</button>
            <button onclick="addEntry()">+ Add Option</button>
            <button onclick="resetEntries()">Reset</button>
        </div>
        
        <div id="result" class="result"></div>
        
        <div class="entries-panel">
            <h3>Your Options</h3>
            <div id="entryList"></div>
        </div>
    </div>

    <footer>
        <p>Made for fair random choices</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
